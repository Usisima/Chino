<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F4F7FC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0B101B" media="(prefers-color-scheme: dark)">
<meta name="color-scheme" content="light dark">
<title>Chino · HSK</title>
<script>
  /* aplica el tema guardado antes de pintar (evita parpadeo) */
  (function () {
    try {
      var s = JSON.parse(localStorage.getItem('chino_settings') || '{}');
      if (s.theme === 'light' || s.theme === 'dark') document.documentElement.setAttribute('data-theme', s.theme);
    } catch (e) {}
  })();
</script>

  </div>
</header>
